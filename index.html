<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Platform</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

/* TOP BAR */

.topbar{
background:#c61b59;
color:white;
padding:8px 20px;
display:flex;
justify-content:space-between;
font-size:14px;
}

/* NAVBAR */

.navbar{
background:#ff2d75;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 40px;
color:white;
}

.logo{
font-size:26px;
font-weight:bold;
}

.nav-links{
list-style:none;
display:flex;
gap:25px;
}

.nav-links li{
cursor:pointer;
}

/* HERO SECTION */

.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1519741497674-611481863552") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.hero-content{
position:relative;
z-index:1;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

/* SEARCH BOX */

.search-box{
display:flex;
justify-content:center;
gap:10px;
}

.search-box select,
.search-box input{
padding:12px;
border:none;
border-radius:4px;
width:200px;
}

.search-box button{
background:#ff2d75;
border:none;
color:white;
padding:12px 25px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.search-box button:hover{
background:#d81b60;
}

</style>

</head>

<body>

<div class="topbar">
<span>India's Favourite Wedding Planning Platform</span>
<span>Write Review | Download App</span>
</div>

<div class="navbar">
<div class="logo">WedMeGood</div>

<ul class="nav-links">
<li>Venues</li>
<li>Vendors</li>
<li>Photos</li>
<li>Real Weddings</li>
<li>Blog</li>
<li>E-Invites</li>
<li>Genie</li>
</ul>
</div>

<div class="hero">

<div class="hero-content">

<h1>Your Wedding, Your Way</h1>
<p>Find the best wedding vendors with thousands of trusted reviews</p>

<div class="search-box">
<select>
<option>Select vendor type</option>
<option>Photographer</option>
<option>Makeup Artist</option>
<option>Wedding Planner</option>
</select>

<select>
<option>Select city</option>
<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
</select>

<button>Get Started</button>
</div>

</div>

</div>

</body>
</html>
